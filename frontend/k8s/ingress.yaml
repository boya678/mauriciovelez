apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: apuestas
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: apuestas.datara.com           # <- ajusta tu dominio
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
