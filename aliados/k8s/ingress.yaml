apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aliados
  namespace: mauriciovelez
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: aliados.mauricioveleznumerologo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aliados
                port:
                  number: 80
  tls:
    - hosts:
        - aliados.mauricioveleznumerologo.com
      secretName: aliados-mauricioveleznumerologo-tls
