<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="logo"><span class="material-icons" style="font-size:3rem">support_agent</span></div>
      <h1>ChatSystem</h1>
      <p>Plataforma de atención al cliente</p>
    </div>

    <form class="login-form" (ngSubmit)="submit()" #f="ngForm">
      @if (error()) {
        <div class="alert-error">{{ error() }}</div>
      }

      <div class="form-group">
        <label for="tenant">Tenant / Empresa</label>
        <input
          id="tenant"
          class="form-control"
          type="text"
          placeholder="mi-empresa"
          [(ngModel)]="tenantSlug"
          name="tenantSlug"
          autocomplete="organization"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          class="form-control"
          type="email"
          placeholder="agente@empresa.com"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          class="form-control"
          type="password"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
          required
        />
      </div>

      <button
        class="btn btn-primary login-btn"
        type="submit"
        [disabled]="loading()"
      >
        @if (loading()) { Ingresando… } @else { Ingresar }
      </button>
    </form>
  </div>
</div>
