version: "3.9"

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatsystem
      POSTGRES_PASSWORD: chatsystem
      POSTGRES_DB: chatsystem
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatsystem"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Migrations (run once on startup) ───────────────────────────────────────
  migrate:
    build:
      context: ./backend
    env_file: ./backend/.env
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy

  # ── API server ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      LOG_LEVEL: INFO

  # ── Background workers ─────────────────────────────────────────────────────
  workers:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    command: python -m app.workers.runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
