apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rifa
  namespace: mauriciovelez
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: rifa.mauricioveleznumerologo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rifa
                port:
                  number: 80
  tls:
    - hosts:
        - rifa.mauricioveleznumerologo.com
      secretName: rifa-mauricioveleznumerologo-tls
