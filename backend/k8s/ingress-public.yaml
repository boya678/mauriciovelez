# Ingress separado para rutas públicas del backend.
# Aplica rate-limit de 20 req/min por IP para proteger el endpoint de loterías.
# Se declara con path más específico (/public) que el ingress principal (/),
# por lo que el nginx-ingress lo prioriza para esas rutas.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-public
  namespace: mauriciovelez
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    # 20 peticiones por minuto por IP
    nginx.ingress.kubernetes.io/limit-rpm: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
spec:
  ingressClassName: nginx
  rules:
    - host: api.mauricioveleznumerologo.com
      http:
        paths:
          - path: /public
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
  tls:
    - hosts:
        - api.mauricioveleznumerologo.com
      secretName: api-mauricioveleznumerologo-tls
